<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipping Id Card ui design</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <section>
        <div class="container">
<div class="card-front-face">
<header class="header">
    <span class="logo">
        <img src="./logo.png" alt="logo png">
        <h5>Master Card</h5>
    </span>
    <img src="./chip.png" alt="chip" class="chip">
</header>
<div class="card-details">
    <div class="name-number">
        <h6>Card Number</h6>
        <h5 class="number">8090 6467 3245 7849</h5>
        <h5 class="name">Sabir Ali</h5>
    </div>
    <div class="valid-date">
        <h6>Valid Thru</h6>
        <h5>05/28</h5>
      </div>
</div>
    </section>
</body>
</html>
